<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김태현 · 웹 명함</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-gradient"></div>
    <main class="card">
      <section class="avatar-section">
        <div class="avatar">
          <div class="avatar-hair"></div>
          <div class="avatar-face">
            <div class="avatar-eyes">
              <span class="eye left"></span>
              <span class="eye right"></span>
            </div>
            <div class="avatar-sunglasses"></div>
            <div class="avatar-mouth avatar-mouth-smirk"></div>
          </div>
          <div class="avatar-body"></div>
        </div>
      </section>

      <section class="info-section">
        <h1 class="name">김태현</h1>
        <p class="role">SideOnAI 대표</p>
        <p class="tagline" id="tagline">"AI와 함께 놀고 있습니다. 같이 노실 분?"</p>

        <div class="contact">
          <a href="mailto:th@Sideonai.com" class="contact-item">
            <span class="label">이메일</span>
            <span class="value">th@Sideonai.com</span>
          </a>
          <button class="contact-item copy-phone" data-phone="010-111-1111">
            <span class="label">전화</span>
            <span class="value">010-111-1111</span>
          </button>
        </div>

        <div class="actions">
          <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer" class="primary linkedin-btn">LinkedIn</a>
          <a href="https://www.youtube.com/@ai-study" target="_blank" rel="noopener noreferrer" class="primary youtube-btn">YouTube</a>
          <button id="themeToggle" class="primary">테마 바꾸기</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>© 2026 KIM TAEHYEON</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
